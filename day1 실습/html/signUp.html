<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>

    <h1>👤 회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">

        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="userId">아이디: </label>
                <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required> (필수)
            </p>
            <p>
                <label for="userPw">비밀번호: </label>
                <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required> (필수)
            </p>
            <p>
                <label for="userEmail">이메일: </label>
                <input type="text" id="userEmail" name="userEmail" placeholder="example"> @
                <select name="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver">naver.com</option>
                    <option value="gmail">gmail.com</option>
                    <option value="daum">daum.net</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label for="userName">이름: </label>
                <input type="text" id="userName" name="userName">
            </p>
            <p>
                <label for="userBirth">생년월일: </label>
                <input type="date" id="userBirth" name="userBirth">
            </p>
            <p>
                성별: 
                <input type="radio" id="genderM" name="gender" value="male">
                <label for="genderM">남성</label>
                <input type="radio" id="genderF" name="gender" value="female">
                <label for="genderF">여성</label>
                <input type="radio" id="genderN" name="gender" value="none" checked>
                <label for="genderN">선택안함</label>
            </p>
            <p>
                관심 분야 (중복 선택 가능):<br>
                <input type="checkbox" id="field1" name="interest" value="frontend">
                <label for="field1">웹 프론트엔드 (Vue.js/HTML)</label><br>
                
                <input type="checkbox" id="field2" name="interest" value="uiux">
                <label for="field2">UI/UX 디자인 표준</label><br>
                
                <input type="checkbox" id="field3" name="interest" value="backend">
                <label for="field3">백엔드 & 데이터베이스</label><br>
                
                <input type="checkbox" id="field4" name="interest" value="cloud">
                <label for="field4">클라우드 & 인프라</label>
            </p>
            <p>
                <label for="joinPath">가입 경로: </label>
                <select id="joinPath" name="joinPath">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">인터넷 검색</option>
                    <option value="recommend">지인 추천</option>
                    <option value="sns">SNS 광고</option>
                    <option value="etc">기타</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="introText">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                <textarea id="introText" name="introText" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </p>
        </fieldset>

        <br>

        <input type="submit" value="동의하고 회원가입">
        <input type="reset" value="다시 작성">

    </form>

</body>
</html>
